  <main class="contact">
    <div class="mac-window contact-window pixel-corners">
      <div class="mac-window__bar">

      <div class="mac-window__body">
        <p class="contact-intro">You made it this far. Let's actually talk. The form below goes straight to my inbox; LinkedIn and Twitter/X work too if that's easier.</p>

        <!-- Web3Forms: add your access key in the hidden input below when ready. -->
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="1e168a88-a05b-4d01-a942-2e3ff2838166">
          <input type="hidden" name="subject" value="New message from breejones.ai">
          <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" autocomplete="off">

          <label class="field">
            <span class="field__label">Name</span>
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label class="field">
            <span class="field__label">Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label class="field">
            <span class="field__label">Message</span>
            <textarea name="message" rows="5" required></textarea>
          </label>

          <button class="press-start contact-submit" type="submit">Send Message</button>
        </form>
      </div>
    </div>
